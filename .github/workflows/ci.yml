name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Tidy
        run: go mod tidy
      - name: Build all Go services
        run: |
          go build -o bin/registry-go ./services/registry-go
          go build -o bin/dbproxy-go ./services/dbproxy-go
          go build -o bin/biz-go ./services/biz-go
          go build -o bin/logstats-go ./services/logstats-go
      - name: Run Go tests
        run: go test ./common/go/...

  cpp-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v1.3
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - name: Build C++ services
        run: cmake --build build --config Release
      - name: Run C++ tests
        run: ./build/Release/test-crypto.exe

  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-protoc@v2
        with:
          version: "25.1"
      - name: Verify proto generation
        run: |
          protoc --version
          # TODO: add protoc gen scripts and verify generated code is up to date

  e2e-phase1:
    runs-on: windows-latest
    needs: [go-build, cpp-build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: microsoft/setup-msbuild@v1.3
      - name: Build all binaries
        run: |
          go build -o bin/registry-go.exe ./services/registry-go
          go build -o bin/biz-go.exe ./services/biz-go
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          Copy-Item build/Release/gateway-cpp.exe bin/gateway-cpp.exe
      - name: Ensure gateway.json exists
        run: |
          if (!(Test-Path gateway.json)) { Copy-Item services/gateway-cpp/gateway.json gateway.json }
      - name: Run Phase 1 E2E test
        run: |
          go run tests/phase1/main.go

  docker-build:
    runs-on: ubuntu-latest
    needs: [go-build, cpp-build, e2e-phase1]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker images
        run: |
          docker compose -f tools/deploy/docker-compose.yml build
      - name: Test Docker compose up
        run: |
          docker compose -f tools/deploy/docker-compose.yml up -d --wait
          sleep 10
          curl -f http://localhost:8081 || true
          docker compose -f tools/deploy/docker-compose.yml down
