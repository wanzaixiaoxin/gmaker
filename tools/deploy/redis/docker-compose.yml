version: "3.8"

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    ports:
      - "6371:6371"
      - "16371:16371"
    volumes:
      - ./config/redis-1.conf:/usr/local/etc/redis/redis.conf:ro
      - ./data/node-1:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - redis-cluster

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
