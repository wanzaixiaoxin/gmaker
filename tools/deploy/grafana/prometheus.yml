global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['127.0.0.1:9081']

  - job_name: 'biz'
    static_configs:
      - targets: ['127.0.0.1:9082', '127.0.0.1:9083']

  - job_name: 'logstats'
    static_configs:
      - targets: ['127.0.0.1:8086']
        metrics_path: /health
