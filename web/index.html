<body>
<div id="app">
    <!-- 登录/注册面板 -->
    <div id="authPanel" class="panel">
        <h2>🚀 gmaker Web 聊天室</h2>
        <div class="login-tabs">
            <button id="tabLogin" class="active" onclick="switchTab('login')">登录</button>
            <button id="tabRegister" onclick="switchTab('register')">注册</button>
        </div>
        <input type="text" id="account" placeholder="账号" value="">
        <input type="password" id="password" placeholder="密码" value="">
        <button id="btnAuth" onclick="doAuth()">登录</button>
        <div id="authMsg"></div>
    </div>

    <!-- 大厅面板 -->
    <div id="lobbyPanel" class="panel hidden">
        <div class="toolbar">
            <div>
                <strong id="userLabel">用户</strong>
                <button class="secondary" onclick="logout()">登出</button>
            </div>
            <button onclick="refreshRooms()">🔄 刷新列表</button>
        </div>
        <div class="toolbar">
            <input type="text" id="newRoomName" placeholder="新聊天室名称" style="width:200px;margin:0;">
            <button onclick="createRoom()">➕ 创建</button>
        </div>
        <table class="room-list">
            <thead>
                <tr><th>ID</th><th>名称</th><th>创建者</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody id="roomTableBody"></tbody>
        </table>
        <div id="lobbyMsg"></div>
    </div>

    <!-- 房间面板 -->
    <div id="roomPanel" class="panel hidden">
        <div class="toolbar">
            <div>
                <strong id="roomTitle">房间</strong>
                <button class="secondary" onclick="backToLobby()">← 返回大厅</button>
            </div>
            <button id="btnCloseRoom" class="danger hidden" onclick="closeRoom()">🗑 关闭房间</button>
        </div>
        <div id="msgList" class="msg-list"></div>
        <div class="msg-input-row">
            <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button onclick="sendMsg()">发送</button>
        </div>
        <div id="roomMsg"></div>
    </div>

    <div class="status-bar" id="statusBar">未连接</div>
</div>

<script>
const LOGIN_HTTP = 'http://127.0.0.1:8084';

let wsClient = null;
let chatAPI = null;
let playerID = 0;
let playerName = '';
let token = '';
let currentRoom = null;
let authMode = 'login';
let root = null;

// 加载 protobuf descriptor
try {
    root = protobuf.Root.fromJSON(PROTO_DESCRIPTOR);
    setStatus('Protobuf 加载完成，请登录');
} catch (e) {
    setStatus('Protobuf 加载失败: ' + e.message);
}

function setStatus(text) {
    document.getElementById('statusBar').textContent = text;
}

function showMsg(id, text, isError) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = isError ? 'error' : 'success';
}

function switchTab(mode) {
    authMode = mode;
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
    document.getElementById('btnAuth').textContent = mode === 'login' ? '登录' : '注册';
    document.getElementById('authMsg').textContent = '';
}

async function doAuth() {
    const account = document.getElementById('account').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!account || !password) {
        showMsg('authMsg', '请输入账号和密码', true);
        return;
    }

    setStatus('请求中...');
    try {
        if (authMode === 'register') {
            const resp = await fetch(LOGIN_HTTP + '/api/v1/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ account, password })
            });
            const data = await resp.json();
            if (data.code !== 0) {
                throw new Error(data.msg || '注册失败');
            }
            showMsg('authMsg', '注册成功，请登录', false);
            switchTab('login');
            setStatus('未连接');
            return;
        }

        // 登录模式：先 HTTP 登录
        const resp = await fetch(LOGIN_HTTP + '/api/v1/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ account, password })
        });
        const data = await resp.json();
        if (data.code !== 0) {
            throw new Error(data.msg || '登录失败');
        }

        playerID = data.player_id || 0;
        playerName = account; // 使用账号名作为临时昵称
        token = data.token || '';
        const gatewayAddr = data.gateway_addr || '127.0.0.1:8083';
        setStatus('获取到 Gateway: ' + gatewayAddr + '，正在连接 WS...');

        // 建立 WebSocket 连接
        const wsUrl = 'ws://' + gatewayAddr;
        wsClient = new WSClient(wsUrl);
        await wsClient.connect();
        chatAPI = new ChatAPI(wsClient, root);

        setStatus('已连接 | 玩家ID: ' + playerID);
        showMsg('authMsg', '', false);

        // 发送玩家绑定请求（单设备登录）
        try {
            const BindReq = root.lookupType('protocol.PlayerBindReq');
            const bindPayload = BindReq.encode(BindReq.create({ playerId: playerID, token: token })).finish();
            const bindRes = await wsClient.call(Cmd.GW_PLAYER_BIND, bindPayload, 5000);
            const BindRes = root.lookupType('protocol.PlayerBindRes');
            const bindResult = BindRes.decode(bindRes.payload);
            if (bindResult.code !== 0) {
                throw new Error('绑定失败: ' + bindResult.msg);
            }
            setStatus('已绑定 | 玩家ID: ' + playerID);
        } catch (e) {
            setStatus('绑定失败');
            showMsg('authMsg', e.message || '绑定失败', true);
            wsClient.close();
            wsClient = null;
            return;
        }

        // 监听推送
        chatAPI.onNotify((msg) => {
            if (currentRoom && msg.msg && msg.msg.roomId === currentRoom.roomId) {
                // 过滤掉自己发送的消息（已经在sendMsg中显示过了）
                if (msg.msg.senderId !== playerID) {
                    appendMsg(msg.msg, false);
                }
            }
        });

        // 监听被踢通知（账号在其他地方登录）
        wsClient.onKick = (payload) => {
            try {
                const KickNotify = root.lookupType('protocol.PlayerKickNotify');
                const notify = KickNotify.decode(payload);
                alert('⚠️ ' + (notify.reason || '您的账号已在其他地方登录'));
            } catch (e) {
                alert('⚠️ 您的账号已在其他地方登录');
            }
            logout();
        };

        showPanel('lobbyPanel');
        document.getElementById('userLabel').textContent = '用户: ' + account + ' (ID:' + playerID + ')';
        refreshRooms();
    } catch (e) {
        setStatus('连接失败');
        showMsg('authMsg', e.message || '网络错误', true);
        if (wsClient) { wsClient.close(); wsClient = null; }
    }
}

function logout() {
    if (wsClient) wsClient.close();
    playerID = 0;
    token = '';
    currentRoom = null;
    showPanel('authPanel');
    setStatus('未连接');
}

function showPanel(id) {
    ['authPanel', 'lobbyPanel', 'roomPanel'].forEach(pid => {
        document.getElementById(pid).classList.toggle('hidden', pid !== id);
    });
}

async function refreshRooms() {
    try {
        const res = await chatAPI.listRooms(1, 100);
        const tbody = document.getElementById('roomTableBody');
        tbody.innerHTML = '';
        if (res.rooms && res.rooms.length) {
            res.rooms.forEach(r => {
                const tr = document.createElement('tr');
                const date = r.createdAt ? new Date(r.createdAt * 1000).toLocaleString() : '-';
                tr.innerHTML = `
                    <td>${r.roomId}</td>
                    <td>${escapeHtml(r.name)}</td>
                    <td>${r.creatorId}</td>
                    <td>${date}</td>
                    <td></td>
                `;
                const btn = document.createElement('button');
                btn.textContent = '加入';
                btn.onclick = () => enterRoom(r.roomId, r.name);
                tr.lastElementChild.appendChild(btn);
                tbody.appendChild(tr);
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">暂无聊天室</td></tr>';
        }
    } catch (e) {
        showMsg('lobbyMsg', '获取列表失败: ' + e.message, true);
    }
}

async function createRoom() {
    const name = document.getElementById('newRoomName').value.trim();
    if (!name) return;
    try {
        const res = await chatAPI.createRoom(name, playerID);
        if (!res.result || !res.result.ok) throw new Error(res.result ? res.result.msg : '创建失败');
        document.getElementById('newRoomName').value = '';
        refreshRooms();
        enterRoom(res.room.roomId, res.room.name);
    } catch (e) {
        showMsg('lobbyMsg', '创建失败: ' + e.message, true);
    }
}

async function enterRoom(roomId, roomName) {
    try {
        const res = await chatAPI.joinRoom(roomId, playerID);
        if (!res.result || !res.result.ok) throw new Error(res.result ? res.result.msg : '加入失败');
        currentRoom = res.room;
        document.getElementById('roomTitle').textContent = '房间: ' + roomName;
        document.getElementById('btnCloseRoom').classList.toggle('hidden', currentRoom.creatorId !== playerID);
        showPanel('roomPanel');

        const msgList = document.getElementById('msgList');
        msgList.innerHTML = '';
        if (res.recentMsgs && res.recentMsgs.length) {
            res.recentMsgs.forEach(m => appendMsg(m, m.senderId === playerID));
        }
    } catch (e) {
        showMsg('lobbyMsg', '加入房间失败: ' + e.message, true);
    }
}

function backToLobby() {
    if (currentRoom) {
        chatAPI.leaveRoom(currentRoom.roomId, playerID).catch(() => {});
        currentRoom = null;
    }
    showPanel('lobbyPanel');
    refreshRooms();
}

async function sendMsg() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content || !currentRoom) return;
    try {
        const res = await chatAPI.sendMsg(currentRoom.roomId, playerID, content, playerName);
        if (!res.result || !res.result.ok) throw new Error(res.result ? res.result.msg : '发送失败');
        appendMsg(res.msg, true);
        input.value = '';
    } catch (e) {
        showMsg('roomMsg', '发送失败: ' + e.message, true);
    }
}

function appendMsg(msg, isMine) {
    const list = document.getElementById('msgList');
    const div = document.createElement('div');
    div.className = 'msg-item' + (isMine ? ' mine' : '');
    const time = msg.sentAt ? new Date(msg.sentAt * 1000).toLocaleTimeString() : '';
    div.innerHTML = `
        <div class="meta">${msg.senderName || msg.senderId} · ${time}</div>
        <div class="content">${escapeHtml(msg.content)}</div>
    `;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
}

async function closeRoom() {
    if (!currentRoom || currentRoom.creatorId !== playerID) return;
    if (!confirm('确定要关闭此聊天室吗？')) return;
    try {
        const res = await chatAPI.closeRoom(currentRoom.roomId, playerID);
        if (!res.result || !res.result.ok) throw new Error(res.result ? res.result.msg : '关闭失败');
        currentRoom = null;
        showPanel('lobbyPanel');
        refreshRooms();
    } catch (e) {
        showMsg('roomMsg', '关闭失败: ' + e.message, true);
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
</body>
</html>
