syntax = "proto3";

package registry;
option go_package = "github.com/gmaker/game-server/gen/go/registry";

// ==================== 节点信息 ====================

message NodeInfo {
    string service_type = 1;           // 服务类型，如 "gateway", "biz", "realtime"
    string node_id      = 2;           // 全局唯一实例 ID，建议格式：{hostname}-{pid}-{timestamp}
    string host         = 3;           // 监听 IP
    uint32 port         = 4;           // 监听端口
    map<string, string> metadata = 5;  // 扩展标签，如 region/zone/version
    uint64 load_score   = 6;           // 负载分，越小越优先，路由层参考
    uint64 register_at  = 7;           // 注册时间戳（Unix 秒）
}

message NodeList {
    repeated NodeInfo nodes = 1;
}

// ==================== 注册中心事件 ====================

message NodeEvent {
    enum Type {
        JOIN   = 0;
        LEAVE  = 1;
        UPDATE = 2;
    }
    Type     type = 1;
    NodeInfo node = 2;
}

// ==================== 通用请求/响应 ====================

message Result {
    bool   ok   = 1;
    uint32 code = 2;  // 0 表示成功，非零见 errors.toml 定义
    string msg  = 3;
}

message NodeId {
    string node_id = 1;
}

message ServiceType {
    string service_type = 1;
}

// ==================== Registry 服务接口 ====================
//
// 说明：
// 1. Registry 作为无状态 TCP 服务，对内暴露以下 RPC 接口。
// 2. C++/Go 服务通过框架统一的 TCP + protobuf3 连接 Registry，无需直接访问 Etcd。
// 3. Registry 内部将请求转译为对 Etcd 的 gRPC 调用（Lease / Put / KeepAlive / Watch）。
//
// Etcd 映射关系：
// - Register  -> etcd LeaseGrant(15s) + Put(/registry/nodes/{svc}/{node_id}, NodeInfo bytes, lease)
// - Heartbeat -> etcd LeaseKeepAlive(leaseID)
// - Discover  -> etcd Get(/registry/nodes/{svc}/, prefix)
// - Watch     -> etcd Watch(/registry/nodes/{svc}/, prefix), 事件流转为 NodeEvent 流

service Registry {
    // 服务注册。Registry 会为该节点在 Etcd 上创建一个 15s TTL 的 Lease。
    rpc Register(NodeInfo) returns (Result);

    // 心跳保活。Registry 收到后会向 Etcd 续租对应 Lease。
    rpc Heartbeat(NodeId) returns (Result);

    // 全量发现。返回指定服务类型的当前全部存活节点列表。
    rpc Discover(ServiceType) returns (NodeList);

    // 增量监听。通过长连接实时推送节点变更事件（JOIN / LEAVE / UPDATE）。
    rpc Watch(ServiceType) returns (stream NodeEvent);
}
