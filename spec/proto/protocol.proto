syntax = "proto3";
package protocol;

option go_package = "github.com/gmaker/luffa/gen/go/protocol";

// ============================================================
// 服务类型定义
// ============================================================

enum ServiceType {
    SERVICE_UNKNOWN   = 0;
    
    // 基础设施服务 (1-9)
    SERVICE_REGISTRY  = 1;   // 注册中心
    SERVICE_GATEWAY   = 2;   // 网关
    SERVICE_DBPROXY   = 3;   // 数据库代理
    
    // 业务服务 (10-19)
    SERVICE_BIZ       = 10;  // 业务服务
    SERVICE_CHAT      = 11;  // 聊天服务
    SERVICE_LOGIN     = 12;  // 登录服务
    SERVICE_LOGSTATS  = 13;  // 日志统计服务
    
    // 实时服务 (20-29)
    SERVICE_REALTIME  = 20;  // 实时服务
    
    // 工具服务 (30-39)
    SERVICE_BOT       = 30;  // 机器人服务
}

// ============================================================
// 命令 ID 定义 (按服务类型分范围)
// ============================================================
// 
// 命令 ID 分配规则:
// - 0x00000000 - 0x000000FF: 系统命令 (握手、心跳等)
// - 0x00000100 - 0x00000FFF: Gateway 内部命令
// - 0x00001000 - 0x00001FFF: Registry 命令
// - 0x00002000 - 0x00002FFF: DBProxy 命令
// - 0x00010000 - 0x0001FFFF: Biz 服务命令
// - 0x00020000 - 0x0002FFFF: Login / Realtime 服务命令
// - 0x00030000 - 0x0003FFFF: Chat 服务命令
// - 0x00040000 - 0x0004FFFF: LogStats 服务命令
// - 0x000E0000 - 0x000EFFFF: DBProxy 内部 RPC 命令
// - 0x000F0000 - 0x000FFFFF: Registry 内部 RPC 命令
// ============================================================

enum CmdSystem {
    // 系统命令 (0x00000000 - 0x000000FF)
    CMD_SYS_UNKNOWN       = 0;
    CMD_SYS_HEARTBEAT     = 0x00000001;  // 心跳
    CMD_SYS_HANDSHAKE     = 0x00000002;  // 握手
    CMD_SYS_ERROR_PACKET  = 0x00000003;  // 错误包
}

enum CmdCommon {
    // 公共命令 (0x00001000 - 0x00001FFF)
    CMD_CMN_UNKNOWN       = 0;
    CMD_CMN_LOGIN_REQ     = 0x00001000;  // 登录请求
    CMD_CMN_LOGIN_RES     = 0x00001001;  // 登录响应
    CMD_CMN_REGISTER_REQ  = 0x00001002;  // 注册请求
    CMD_CMN_REGISTER_RES  = 0x00001003;  // 注册响应
    CMD_CMN_GATEWAY_FORWARD = 0x00001004;  // 网关转发
}

enum CmdGatewayInternal {
    // Gateway 内部命令 (0x00000100 - 0x00000FFF)
    CMD_GW_UNKNOWN        = 0;
    CMD_GW_ROOM_JOIN      = 0x00001010;  // 房间加入通知
    CMD_GW_ROOM_LEAVE     = 0x00001011;  // 房间离开通知
}

enum CmdRegistryInternal {
    // Registry 内部 RPC 命令 (0x000F0000 - 0x000FFFFF)
    CMD_REG_INT_UNKNOWN   = 0;
    CMD_REG_INT_REGISTER  = 0x000F0001;  // 注册节点
    CMD_REG_INT_HEARTBEAT = 0x000F0002;  // 心跳
    CMD_REG_INT_DISCOVER  = 0x000F0003;  // 发现服务
    CMD_REG_INT_WATCH     = 0x000F0004;  // 监听变更
    CMD_REG_INT_NODE_EVENT = 0x000F0005;  // 节点事件通知
    CMD_REG_INT_SUBSCRIBE = 0x000F0006;  // 批量订阅
}

enum CmdDBProxyInternal {
    // DBProxy 内部 RPC 命令 (0x000E0000 - 0x000EFFFF)
    CMD_DB_INT_UNKNOWN       = 0;
    CMD_DB_INT_MYSQL_QUERY   = 0x000E0001;
    CMD_DB_INT_MYSQL_QUERY_RES = 0x000E0002;
    CMD_DB_INT_MYSQL_EXEC    = 0x000E0003;
    CMD_DB_INT_MYSQL_EXEC_RES = 0x000E0004;
}

enum CmdBiz {
    // Biz 服务命令 (0x00010000 - 0x0001FFFF)
    CMD_BIZ_UNKNOWN       = 0;
    CMD_BIZ_GET_PLAYER_REQ    = 0x00010000;
    CMD_BIZ_GET_PLAYER_RES    = 0x00010001;
    CMD_BIZ_GET_BAG_REQ       = 0x00010002;
    CMD_BIZ_GET_BAG_RES       = 0x00010003;
    CMD_BIZ_PING              = 0x00010004;
    CMD_BIZ_PONG              = 0x00010005;
    CMD_BIZ_UPDATE_PLAYER_REQ     = 0x00010006;
    CMD_BIZ_UPDATE_PLAYER_RES     = 0x00010007;
    CMD_BIZ_GET_PLAYER_ROOMS_REQ  = 0x00010008;
    CMD_BIZ_GET_PLAYER_ROOMS_RES  = 0x00010009;
}

enum CmdChat {
    // Chat 服务命令 (0x00030000 - 0x0003FFFF)
    CMD_CHAT_UNKNOWN          = 0;
    CMD_CHAT_CREATE_ROOM_REQ  = 0x00030000;
    CMD_CHAT_CREATE_ROOM_RES  = 0x00030001;
    CMD_CHAT_JOIN_ROOM_REQ    = 0x00030002;
    CMD_CHAT_JOIN_ROOM_RES    = 0x00030003;
    CMD_CHAT_LEAVE_ROOM_REQ   = 0x00030004;
    CMD_CHAT_LEAVE_ROOM_RES   = 0x00030005;
    CMD_CHAT_SEND_MSG_REQ     = 0x00030006;
    CMD_CHAT_SEND_MSG_RES     = 0x00030007;
    CMD_CHAT_MSG_NOTIFY       = 0x00030008;
    CMD_CHAT_GET_HISTORY_REQ  = 0x00030009;
    CMD_CHAT_GET_HISTORY_RES  = 0x0003000A;
    CMD_CHAT_CLOSE_ROOM_REQ   = 0x0003000B;
    CMD_CHAT_CLOSE_ROOM_RES   = 0x0003000C;
    CMD_CHAT_LIST_ROOM_REQ    = 0x0003000D;
    CMD_CHAT_LIST_ROOM_RES    = 0x0003000E;
}

enum CmdLogStats {
    // LogStats 服务命令 (0x00040000 - 0x0004FFFF)
    CMD_LOGSTATS_UNKNOWN  = 0;
    CMD_LOGSTATS_BASE     = 0x00040000;
}

enum CmdRealtime {
    // Realtime 服务命令 (0x00020000 - 0x0002FFFF)
    CMD_RT_UNKNOWN        = 0;
    CMD_RT_ROOM_ENTER_REQ = 0x00020000;
    CMD_RT_ROOM_ENTER_RES = 0x00020001;
    CMD_RT_ROOM_LEAVE_REQ = 0x00020002;
    CMD_RT_ROOM_LEAVE_RES = 0x00020003;
    CMD_RT_FRAME_SYNC     = 0x00020004;
    CMD_RT_STATE_SYNC     = 0x00020005;
}

// ============================================================
// 命令范围定义 (用于路由)
// ============================================================

message CmdRange {
    uint32 start = 1;
    uint32 end = 2;
}

// 服务命令范围映射
message ServiceCmdRanges {
    CmdRange chat = 1;      // Chat 服务命令范围
    CmdRange biz = 2;       // Biz 服务命令范围
    CmdRange login = 3;     // Login 服务命令范围
    CmdRange realtime = 4;  // Realtime 服务命令范围
}

// 默认命令范围
// Chat:    0x00030000 - 0x0003FFFF
// Biz:     0x00010000 - 0x0001FFFF
// Login:   0x00020000 - 0x0002FFFF
// Realtime: 0x00050000 - 0x0005FFFF
