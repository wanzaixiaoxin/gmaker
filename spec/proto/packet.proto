syntax = "proto3";

package common;
option go_package = "github.com/gmaker/luffa/gen/go/common";

// Packet 是通用包体消息，用于调试工具、日志落盘、网关内部异步透传等场景。
// 实际网络通信时，包头采用 18 字节固定二进制格式（详见 DESIGN.md 4.1 节），
// 仅 Payload 字段为 protobuf 序列化后的 bytes。
message Packet {
    uint32 magic   = 1;  // 0x9D7F
    uint32 cmd_id  = 2;  // 全局命令号，见 spec/cmd_ids.yaml
    uint32 seq_id  = 3;  // 请求序列号，Req/Res 配对使用；Push 填 0
    uint32 flag    = 4;  // 位标志，见 DESIGN.md 4.1.3
    bytes  payload = 5;  // 具体业务消息的 protobuf 序列化 bytes
}
