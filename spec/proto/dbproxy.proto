syntax = "proto3";

package dbproxy;
option go_package = "github.com/gmaker/luffa/gen/go/dbproxy";

message MySQLColumn {
    string name  = 1;
    string value = 2; // 统一以字符串形式传输，调用方按需解析
}

message MySQLRow {
    repeated MySQLColumn columns = 1;
}

message MySQLQueryReq {
    uint64 uid = 1;
    string sql = 2;
    repeated string args = 3;
}

message MySQLQueryRes {
    bool ok = 1;
    repeated MySQLRow rows = 2; // 结构化行数据
    string error = 3;
}

message MySQLExecReq {
    uint64 uid = 1;
    string sql = 2;
    repeated string args = 3;
}

message MySQLExecRes {
    bool ok = 1;
    int64 last_insert_id = 2;
    int64 rows_affected = 3;
    string error = 4;
}
