# 全局命令号定义
# 所有命令号使用 32 位无符号整数，大端序传输。
# 范围划分：
#   0x00000001 ~ 0x00000FFF : 系统保留
#   0x00001000 ~ 0x0000FFFF : 公共协议
#   0x00010000 ~ 0x7FFFFFFF : 业务协议（按服务/模块分段）
#   0x80000000 ~ 0xFFFFFFFF : 保留扩展

system:
  HEARTBEAT:    0x00000001
  HANDSHAKE:    0x00000002
  ERROR_PACKET: 0x00000003

common:
  LOGIN_REQ:       0x00001000
  LOGIN_RES:       0x00001001
  REGISTER_REQ:    0x00001002
  REGISTER_RES:    0x00001003
  GATEWAY_FORWARD: 0x00001004

biz:
  GET_PLAYER_REQ: 0x00010000
  GET_PLAYER_RES: 0x00010001
  GET_BAG_REQ:    0x00010002
  GET_BAG_RES:    0x00010003
  PING:           0x00010004
  PONG:           0x00010005
  UPDATE_PLAYER_REQ: 0x00010006
  UPDATE_PLAYER_RES: 0x00010007

realtime:
  ROOM_ENTER_REQ:  0x00020000
  ROOM_ENTER_RES:  0x00020001
  ROOM_LEAVE_REQ:  0x00020002
  ROOM_LEAVE_RES:  0x00020003
  FRAME_SYNC:      0x00020004
  STATE_SYNC:      0x00020005

dbproxy_internal:
  REDIS_GET:         0x000E0001
  REDIS_GET_RES:     0x000E0002
  REDIS_SET:         0x000E0003
  REDIS_SET_RES:     0x000E0004
  REDIS_DEL:         0x000E0005
  REDIS_DEL_RES:     0x000E0006
  REDIS_PIPELINE:    0x000E0007
  REDIS_PIPELINE_RES: 0x000E0008
  MYSQL_QUERY:       0x000E0011
  MYSQL_QUERY_RES:   0x000E0012
  MYSQL_EXEC:        0x000E0013
  MYSQL_EXEC_RES:    0x000E0014

chat:
  CHAT_CREATE_ROOM_REQ: 0x00030000
  CHAT_CREATE_ROOM_RES: 0x00030001
  CHAT_JOIN_ROOM_REQ:   0x00030002
  CHAT_JOIN_ROOM_RES:   0x00030003
  CHAT_LEAVE_ROOM_REQ:  0x00030004
  CHAT_LEAVE_ROOM_RES:  0x00030005
  CHAT_SEND_MSG_REQ:    0x00030006
  CHAT_SEND_MSG_RES:    0x00030007
  CHAT_MSG_NOTIFY:      0x00030008
  CHAT_GET_HISTORY_REQ: 0x00030009
  CHAT_GET_HISTORY_RES: 0x0003000A
  CHAT_CLOSE_ROOM_REQ:  0x0003000B
  CHAT_CLOSE_ROOM_RES:  0x0003000C

gateway_internal:
  GW_ROOM_JOIN:  0x00001010
  GW_ROOM_LEAVE: 0x00001011

registry_internal:
  # Registry 内部 RPC 命令号（通过 TCP 传输，非 Gateway 转发）
  REGISTER:   0x000F0001
  HEARTBEAT:  0x000F0002
  DISCOVER:   0x000F0003
  WATCH:      0x000F0004
  NODE_EVENT: 0x000F0005
